## 1. Platform Vision & Core Philosophy

**LevelUp** bridges the gap between academia and industry for B.Tech students across India. It is not just a learning platform — it is a **complete college career ecosystem** that connects students, faculty, department heads, principals, and placement officers through a unified, intelligent system.

### Core Principles
- **Classroom-Centric Architecture**: Every student belongs to a classroom code. All data flows through this hierarchy.
- **Role-Aware Intelligence**: Each user type sees exactly what they need — no more, no less.
- **AI-First Analytics**: Every interaction generates data that feeds into the AI Data Analysis engine for real-time insights.
- **Production-Grade Quality**: Enterprise security, scalability, and UX standards at every layer.

## 3. Classroom Code System

&gt; The **Classroom Code** is the foundational unit of the entire platform. It acts as the unique namespace for grouping students and routing data.

### Code Format
```
{DEPARTMENT}-{YEAR}{SECTION}
```

### Examples
| Code | Meaning |
|---|---|
| `CSE-3A` | Computer Science, 3rd Year, Section A |
| `ECE-2B` | Electronics, 2nd Year, Section B |
| `MECH-4C` | Mechanical, 4th Year, Section C |
| `IT-2D` | Information Technology, 2nd Year, Section D |

### How It Works

1. **Student Registration**: Student selects their department, year, and section → system auto-generates their classroom code (e.g., `CSE-3A`). Student is permanently tagged with this code.
2. **Faculty Assignment**: Faculty are assigned to one or more classroom codes. They can only manage (assignments, attendance, announcements) those specific classrooms.
3. **HOD Aggregation**: HOD sees all classroom codes within their department (e.g., all `CSE-*` codes).
4. **Principal / Placement**: See all classroom codes across all departments.
5. **Data Routing**: All student activity data (study time, quiz scores, resume scores, interview sessions) is tagged with the student's classroom code and stored in the database. This data flows up the hierarchy.

### Database Impact
- Every `User` document stores a `classroomCode` field.
- Every `Activity`, `QuizAttempt`, `Resume`, `Assignment`, `Attendance` document references the student's `classroomCode`.
- Queries for faculty/HOD/principal filter by classroom code range.

## 4. AI Data Analysis Integration

&gt; **Reference Project**: `ai-data-analyst` (previously built). This project's visualization and analysis engine will be integrated into the LevelUp platform for faculty, HOD, principal, and head of placement dashboards.

### Data Flow Architecture

```
┌──────────────────────────────────────────────────────────────┐
│                     STUDENT ACTIVITY                          │
│  (Study Timer, Quiz Results, Resume Scores, Interview        │
│   Sessions, Learning Progress, Live Chat History)            │
└────────────────────────┬─────────────────────────────────────┘
                         │ Tagged with classroomCode
                         ▼
┌──────────────────────────────────────────────────────────────┐
│                   MONGODB DATABASE                            │
│  Collections: activities, quiz_attempts, resumes,             │
│  assignments, attendance, interview_sessions                  │
│  (All documents indexed by classroomCode)                    │
└────────────────────────┬─────────────────────────────────────┘
                         │ Aggregated via API
                         ▼
┌──────────────────────────────────────────────────────────────┐
│              AI DATA ANALYSIS ENGINE                          │
│  - Aggregation by classroomCode / department / college       │
│  - AI-powered trend analysis                                 │
│  - Natural language query interface                          │
│  - Automated insight generation                              │
└────────────────────────┬─────────────────────────────────────┘
                         │ Rendered as
                         ▼
┌──────────────────────────────────────────────────────────────┐
│              VISUALIZATION DASHBOARD                          │
│  - Charts (Bar, Line, Pie, Area, Radar, Heatmap)             │
│  - Tables with sorting/filtering                             │
│  - PDF/CSV Export                                            │
│  - Real-time classroom comparison                            │
│  - AI chat interface for querying data                       │
└──────────────────────────────────────────────────────────────┘
```

### What Data Feeds the AI Analyst

| Data Source | Metrics Provided |
|---|---|
| **Study Timer** | Total study hours per student, per class, average study time, daily/weekly/monthly trends |
| **Quiz Attempts** | Average scores per class, highest/lowest performers, subject-wise breakdown |
| **Resume Analysis** | Average ATS score per class, highest resume scores, keyword gaps |
| **Live Interview** | Number of mock interviews, average duration, topic distribution |
| **Learning Modules** | Module completion %, quiz pass rates, time-to-completion |
| **Daily Streaks** | Consistency metrics, streak leaders per class |
| **Attendance** | Daily/monthly attendance %, absentee trends |
| **Assignments** | Submission rates, on-time vs late submissions, grade distributions |

### Visualization Types
- **Class-level heatmaps**: Study hours across days of the week per classroom
- **Department comparison**: Bar charts comparing average metrics across classes
- **Individual student radar charts**: Multi-axis comparison (study time, quiz score, resume score, interview prep)
- **Trend lines**: Week-over-week improvement in key metrics
- **Leaderboard tables**: Top performers by various metrics
- **AI-generated summaries**: Natural language reports ("CSE-3A has improved their average study time by 40% this month")

### 5.5 🎙️ LIVE INTERVIEW / AI CHAT

**Route:** `/interview`

#### AI Live Interview Chat
- **Speech-to-Text → AI Analysis → Text-to-Speech** pipeline
- Student speaks → browser captures audio → transcribed to text
- AI processes the text → generates intelligent response
- AI response rendered as text AND spoken back via TTS
- **Full conversation history** displayed as chat bubbles

#### Two-Way Interactive AI
&gt; **Critical Feature**: Solve the "dead chat" problem seen in ChatGPT/Gemini voice mode
- After AI responds to the student, **AI proactively asks 2 follow-up questions** related to the topic
- This ensures the conversation keeps flowing even if the student runs out of questions
- Example flow:
  ```
  Student: "Explain polymorphism in Java"
  AI: [Explains polymorphism with examples]
  AI: "Now here's a question for you — Can you explain the difference 
       between compile-time and runtime polymorphism? Also, can you give 
       me a real-world scenario where you'd prefer method overriding 
       over overloading?"
  ```

#### Language Accent Options
- **Indian English** (default) — familiar accent for Indian students
- **British English** — for UK/international company prep
- **American English** — for US-facing companies

#### Interview Tips Section
- Curated tips for technical interviews
- Behavioral interview framework (STAR method)
- Common mistakes to avoid
- Company-specific tips (FAANG, Infosys, TCS, etc.)

#### Foreign Language Learning Section (Bottom of Page)

- Interactive: Click on "A" → see equivalent in all selected languages
- Language selector: French, German, Japanese, Mandarin Chinese

## 6. Database Schema Design

### User Schema (Enhanced)
```javascript
{
  name: String,                    // required
  email: String,                   // required, unique
  password: String,                // required, hashed
  role: Enum['student', 'faculty', 'hod', 'principal', 'placement'],
  college: String,                 // required
  department: String,              // required for all except principal
  year: Number,                    // for student & faculty (1-4)
  section: String,                 // A, B, C, D, etc.
  classroomCode: String,           // auto-generated: "{DEPT}-{YEAR}{SECTION}"
  assignedClassrooms: [String],    // for faculty: multiple classroom codes
  profilePicture: String,
  skills: [String],
  targets: {
    companies: [String],
    roles: [String],
    timeline: String
  },
  streak: {
    current: Number,
    longest: Number,
    lastActiveDate: Date
  },
  dailyTasks: [{
    text: String,
    completed: Boolean,
    date: Date
  }],
  timestamps: true
}
```

### Activity Schema
```javascript
{
  userId: ObjectId (ref: User),
  classroomCode: String,           // indexed for aggregation
  department: String,              // indexed
  college: String,                 // indexed
  category: Enum['dsa', 'webdev', 'ml', 'system_design', 'core_cs', 'aptitude', ...],
  label: String,
  duration: Number,                // seconds
  date: Date,
  timestamps: true
}
```

### Assignment Schema
```javascript
{
  classroomCode: String,           // which class
  subject: String,
  title: String,
  description: String,
  attachments: [String],           // file URLs
  deadline: Date,
  maxMarks: Number,
  createdBy: ObjectId (ref: User), // faculty
  submissions: [{
    studentId: ObjectId (ref: User),
    fileUrl: String,
    text: String,
    submittedAt: Date,
    isLate: Boolean,
    grade: Number,
    feedback: String
  }],
  timestamps: true
}
```

### Attendance Schema
```javascript
{
  classroomCode: String,
  date: Date,
  markedBy: ObjectId (ref: User),  // faculty
  records: [{
    studentId: ObjectId (ref: User),
    status: Enum['present', 'absent', 'late']
  }],
  timestamps: true
}
```

### Announcement Schema
```javascript
{
  classroomCodes: [String],        // can target multiple classes
  title: String,
  content: String,                 // rich text
  attachments: [String],
  isPinned: Boolean,
  createdBy: ObjectId (ref: User), // faculty
  timestamps: true
}
```

### ClassroomAnalytics Schema (Aggregated — for AI Data Analyst)
```javascript
{
  classroomCode: String,
  department: String,
  college: String,
  period: Enum['daily', 'weekly', 'monthly'],
  date: Date,
  metrics: {

    averageStudyHours: Number,
    totalQuizAttempts: Number,
    averageQuizScore: Number,
    highestQuizScore: Number,
    averageResumeScore: Number,
    highestResumeScore: Number,
    totalInterviewSessions: Number,
    activeStudents: Number,
    attendancePercentage: Number,
    assignmentSubmissionRate: Number,
    averageStreak: Number
  },
  topPerformers: [{
    studentId: ObjectId,
    name: String,
    studyHours: Number,
    quizAvg: Number,
    resumeScore: Number

## 8. Role-Based Access Control (RBAC)

### Middleware Implementation
```javascript
// Role hierarchy levels
const ROLE_HIERARCHY = {
  student: 1,
  faculty: 2,
  hod: 3,
  placement: 4,
  principal: 5
};

// Data scope middleware
const scopeData = (req, res, next) =&gt; {
  const user = req.user;
  switch(user.role) {
    case 'student':
      req.scope = { classroomCode: user.classroomCode };
      break;
    case 'faculty':
      req.scope = { classroomCode: { $in: user.assignedClassrooms } };
      break;
    case 'hod':
      req.scope = { department: user.department, college: user.college };
      break;
    case 'principal':
    case 'placement':
      req.scope = { college: user.college };
      break;
  }
  next();
};
```

## 10. Design System & UX Guidelines

### Visual Identity
- **Primary Color**: Cool indigo/slate (professional, trustworthy)
- **Accent Color**: Vibrant cyan/teal (modern, tech-forward)
- **Background**: Deep dark mode (#0a0a0f) with subtle gradients
- **Glass Morphism**: Frosted glass cards with backdrop blur
- **Typography**: Inter / Outfit (Google Fonts) — clean, modern
- **Border Radius**: Generous (2xl / 3xl) for premium feel
- **Shadows**: Subtle glow effects using primary color

### Animation Guidelines
- Page transitions: Fade + slide up (300ms)
- Card hover: Scale 1.02 + shadow lift
- Modal: Spring animation with bounce
- Loading states: Skeleton screens, not spinners
- Celebration: Confetti particles (canvas-confetti library)
- Charts: Animated on first render

### Responsive Breakpoints
- Mobile: &lt; 640px (single column, stacked)
- Tablet: 640px – 1024px (2-column grids)
- Desktop: &gt; 1024px (full multi-column layouts)
- All pages MUST be fully responsive and touch-friendly

### Accessibility
- Semantic HTML5 elements
- ARIA labels on interactive elements
- Keyboard navigation support
- High contrast ratios (WCAG 2.1 AA)
- Focus indicators on all interactive elements
